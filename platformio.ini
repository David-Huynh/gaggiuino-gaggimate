; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32@6.12.0
framework = arduino
monitor_speed = 115200
build_unflags =
    -std=gnu++11
check_flags = 
	cppcheck: --enable=all --inline-suppr --suppress=*:*/.pio/*
monitor_filters =
    esp32_exception_decoder
    time
    default

[display_common]
build_flags =
    -std=c++17
    -std=gnu++17
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_CONF_PATH="${platformio.src_dir}/display/lv_conf.h"
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DLV_CONF_SUPPRESS_DEFINE_CHECK
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_CMN
    -Os
    -DCONFIG_MAX_FILENAME_LEN=64
    -DCONFIG_MAX_URL_LEN=128
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=2
    -DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=64
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
    -DDEFAULT_MAX_WS_CLIENTS=3
lib_deps_default =
    FS
    SPIFFS
    Wire
    SPI
    ble_ota_dfu
    h2zero/NimBLE-Arduino@^1.4.0
    https://github.com/ESP32Async/AsyncTCP.git#v3.4.9
    https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.9.1
    bblanchon/ArduinoJson@^7.2.1
    256dpi/MQTT@^2.5.2
    https://github.com/gaggimate/esp-arduino-ble-scales
    homespan/HomeSpan@1.9.1

[env:display]
board = LilyGo-T-RGB
upload_speed = 921600
build_src_filter = -<*> +<display/> +<version.h>
extra_scripts =
	pre:scripts/auto_firmware_version.py
lib_deps =
    ${display_common.lib_deps_default}
    lewisxhe/SensorLib @ 0.2.3
    bodmer/TFT_eSPI @ 2.5.43
	lvgl/lvgl @ 8.4.0
	moononournation/GFX Library for Arduino @ 1.5.9
build_flags =
    ${display_common.build_flags}

[env:display-headless]
extends = env:display
lib_deps =
    ${display_common.lib_deps_default}
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_HEADLESS
build_src_filter = -<*> +<display/> +<version.h> -<display/drivers/> -<display/ui/> -<display/lv_conf.h>

[env:display-headless-8m]
extends = env:display-headless
board = seeed_xiao_esp32s3

[env:display-headless-uart]
extends = env:display-headless
board = esp32-s3-devkitc-1
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_HEADLESS
    -DGAGGIMATE_UART_COMMS
    -DGAGGIMATE_DISABLE_OTA 
    -DGAGGIMATE_UART_BAUD=460800
    -DGAGGIMATE_UART_RX_PIN=44
    -DGAGGIMATE_UART_TX_PIN=43

[env:display-headless-4m]
extends = env:display-headless
board = esp32-s3-supermini

[env:controller]
board = Gaggimate-Controller
build_src_filter = -<*> +<controller/> +<version.h>
extra_scripts =
    pre:scripts/auto_firmware_version.py
lib_deps =
	GaggiMateController
	FS
	SPIFFS
	ble_ota_dfu
	h2zero/NimBLE-Arduino@^1.4.0
	bblanchon/ArduinoJson@^7.2.1
build_flags =
    -std=c++17
    -std=gnu++17
	-DCORE_DEBUG_LEVEL=3

; ---------------------------------------------------------------------------
; STM32F4 Standalone Controller
; Direct peripheral controller using STM32F4 with FreeRTOS.
; Communicates with web ESP32 via UART (460800 baud).
; Pin configuration defined in include/stm32f4_pindef.h
; Uses UARTComm for serial protocol (line-v1 CSV format).
; ---------------------------------------------------------------------------
[env:stm32f4]
platform = ststm32@19.5.0
board = blackpill_f411ce
framework = arduino
monitor_speed = 115200
extra_scripts =
    pre:scripts/auto_firmware_version.py
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DUSE_HAL_DRIVER=1
    -DSTM32F411xE
    -Os
    -DARDUINO_GENERIC_STM32F4
    -DCORE_DEBUG_LEVEL=3
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
lib_deps =
    GaggiMateController
    UARTComm
    SPI
    Wire
    bblanchon/ArduinoJson@^7.2.1
    https://github.com/stm32duino/STM32FreeRTOS.git
    https://github.com/gaggimate/PSM.Library.git
lib_ignore =
    NimBLE-Arduino
    NimBLEComm
    ble_ota_dfu
build_src_filter = -<*> +<stm32_main.cpp> +<version.h>
upload_protocol = stlink
upload_speed = 460800

